v<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Прослушивание</title>
    <!-- Исправленная ссылка на Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background-color: #FFFAFA;
            padding-top: 90px;
            font-family: sans-serif;
        }

        .audio-container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .cover-image {
            width: 100%;
            max-width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease; /* Ховер-эффект */
        }

        .cover-image:hover {
            transform: scale(1.03);
        }

        audio {
            width: 100%;
            margin-top: 15px;
        }

        .download-btn {
            margin-top: 20px;
            display: inline-block;
            color: #6c757d;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .download-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Моя Электронная Книга</a>
            <ul class="navbar-nav">
		 		    <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
			<li class="nav-item"><a class="nav-link" href="library.html">Библиотека</a></li>
		    <li class="nav-item"><a class="nav-link" href="information.html">Информация</a></li>
		</ul>
		</div>
		</nav>

    <div class="container">
        <div class="audio-container">
            <!-- Обложка -->
            <img src="484-0 (1).webp"" alt="Обложка" class="cover-image">
            
            <!-- Описание -->
            <h2 class="h4">Уроки французского</h2>
            <p class="text-muted">В.Г.Распутин</p>

            <!-- Плеер -->
            <audio controls>
                <source src="nukadeti.ru_-_uroki-francuzskogo.mp3" type="audio/mpeg">
                Ваш браузер не поддерживает аудио.
            </audio>

            <!-- Ссылка на скачивание -->
            <a href="your-audio-file.mp3" download class="download-btn">
			
            </a>
        </div>
    </div>

</body>
</html>
