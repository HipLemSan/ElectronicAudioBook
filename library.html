<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Библиотека</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #FFFAFA;
            color: #2c3e50;
            padding-top: 70px;
        }

        .library {
            text-align: center;
            padding: 20px;
        }

        /* Контейнер для расположения книг в ряд */
        .books-container {
            display: flex;
            justify-content: center; /* Центрируем по горизонтали */
            gap: 40px;               /* Расстояние между блоками */
            flex-wrap: wrap;         /* Чтобы на мобилках переносилось */
            margin-top: 30px;
        }

        .book-item {
            display: flex;
            flex-direction: column;  /* Текст над картинкой */
            align-items: center;
            text-decoration: none;   /* Убираем подчеркивание ссылки */
            color: inherit;
        }

        .book-item p {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .book-item img {
            transition: transform 0.3s; /* Эффект при наведении */
        }

        .book-item:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body data-bs-spy="scroll" data-bs-target="#navbar" data-bs-offset="70">

    <nav id="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Моя Электронная Книга</a>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="library.html">Библиотека</a></li>
                <li class="nav-item"><a class="nav-link" href="information.html">Информация</a></li>
            </ul>
        </div>
    </nav>

    <div class="library">
        <h3>Библиотека</h3>

        <div class="books-container">
            <!-- Аудио книги -->
            <a href="audBook.html" class="book-item">
                <p>Аудио книги</p>
                <img src="audio-book-icon-3d.png" width="370" height="370" alt="audio-book-icon">
            </a>

            <!-- Электронные книги -->
            <a href="elBook.html" class="book-item">
                <p>Электронные книги</p>
                <img src="1006419.png" width="360" height="360" alt="el-book-icon">
            </a>
        </div>
    </div>
  
</body>
</html>
