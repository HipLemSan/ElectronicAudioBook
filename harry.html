<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Прослушивание книги</title>
    <!-- Подключение Bootstrap через полную ссылку -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background-color: #FFFAFA;
            padding-top: 80px;
        }

        .audio-player-container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .audio-info img {
            width: 200px;
            height: 200px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        /* Тот самый ховер-эффект для обложки */
        .audio-info img:hover {
            transform: scale(1.03);
        }

        audio {
            width: 100%;
            margin-top: 20px;
        }

        .playlist {
            margin-top: 25px;
            text-align: left;
        }

        .list-group-item {
            cursor: pointer;
            transition: background 0.2s;
        }

        .list-group-item:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

   <nav id="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
	   <div class="container">
	     <a class="navbar-brand" href="index.html">Моя Электронная Книга</a>
		 <ul class="navbar-nav">
		 	<li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
			<li class="nav-item"><a class="nav-link" href="library.html">Библиотека</a></li>
		    <li class="nav-item"><a class="nav-link" href="information.html">Информация</a></li>
		</ul>
		</div>
		</nav>

    <div class="container text-center">
        <div class="audio-player-container">
            <div class="audio-info">
                <img src="audio-book-icon-3d.png" alt="Обложка книги">
                <h3 id="current-title">Гарри Потер</h3>
                <p class="text-muted">Джоан Роулинг </p>
            </div>

            <!-- Плеер -->
            <audio id="main-player" controls>
                <source id="audio-source" src="track1.mp3" type="audio/mpeg"> 
                Ваш браузер не поддерживает аудио.
            </audio>

            
            <div class="playlist">
                <h5>Список глав:</h5>
                <div class="list-group">
                    <button class="list-group-item list-group-item-action" onclick="changeTrack('ГАРРИ ПОТЕР И ФИЛОСОФСКИЙ КАМЕНЬ.mp3', 'Глава 1: Начало')">
                        ▶ Книга 1: Гарри Поттер и Философский камень
                    </button>
                    <button class="list-group-item list-group-item-action" onclick="changeTrack('Гарри Потер и тайная комната.mp3', 'Глава 2: ')">
                        ▶ Книга 2: Гарри Поттер и Тайная комната
                    </button>
					<button class="list-group-item list-group-item-action" onclick="changeTrack('Garri_Potter_i_Uznik_Azkabana_-_02_(SkySound.cc).mp3', 'Глава 3: ')">
                        ▶ Книга 3: Гарри Поттер и Узник Азкабана
                    </button>
					<button class="list-group-item list-group-item-action" onclick="changeTrack('кубок огня.mp3', 'Глава 4: ')">
                        ▶ Книга 4: Гарри Поттер и Кубок огня
                    </button>
					<button class="list-group-item list-group-item-action" onclick="changeTrack('орден феникса.mp3', 'Глава 5: ')">
                        ▶ Книга 5: Гарри Поттер и Орден Феникса
                    </button>
					<button class="list-group-item list-group-item-action" onclick="changeTrack('CHast_5_-_Garri_Potter_i_Princ-Polukrovka._(SkySound.cc).mp3', 'Глава 6: ')">
                        ▶ Книга 6: Гарри Поттер и Принц-полукровка
                    </button>
					<button class="list-group-item list-group-item-action" onclick="changeTrack('', 'Глава 7: ')">
                        ▶ Книга 7: Гарри Поттер и Дары Смерти
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function changeTrack(src, title) {
            const player = document.getElementById('main-player');
            const source = document.getElementById('audio-source');
            const titleDisplay = document.getElementById('current-title');

            source.src = src;
            titleDisplay.innerText = title;
            
            player.load(); // Перезагружаем плеер с новым файлом
            player.play(); // Сразу запускаем
        }
    </script>

</body>
</html>
